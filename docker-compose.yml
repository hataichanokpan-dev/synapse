# Synapse Production Docker Compose
# Memory Backend for Cerberus AI
# Version: 1.0.0

services:
  # FalkorDB - Graph Database (Redis-based)
  falkordb:
    image: falkordb/falkordb:latest
    container_name: synapse-falkordb
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb_data:/data
    environment:
      - FALKORDB_ARGS=--save 60 1 --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - synapse-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synapse-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - synapse-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Synapse MCP Server
  synapse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapse-server
    ports:
      - "${SYNAPSE_PORT:-47780}:47780"
    environment:
      # LLM Configuration
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}

      # Database Configuration
      - FALKORDB_URI=redis://falkordb:6379
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      - FALKORDB_DATABASE=${FALKORDB_DATABASE:-user-bfipa}
      - QDRANT_URL=http://qdrant:6333

      # Graphiti Configuration
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-user-bfipa}
      - GRAPH_CANONICAL_DATABASE=${GRAPH_CANONICAL_DATABASE:-${FALKORDB_DATABASE:-user-bfipa}}
      - GRAPH_DEFAULT_GROUP_ID=${GRAPH_DEFAULT_GROUP_ID:-global}
      - GRAPH_PROJECTION_MAX_INFLIGHT=${GRAPH_PROJECTION_MAX_INFLIGHT:-1}
      - GRAPH_PROJECTION_MIN_INTERVAL_SECONDS=${GRAPH_PROJECTION_MIN_INTERVAL_SECONDS:-10}
      - GRAPH_PROJECTION_COOLDOWN_SECONDS=${GRAPH_PROJECTION_COOLDOWN_SECONDS:-300}
      - GRAPH_PROJECTION_MAX_RETRIES=${GRAPH_PROJECTION_MAX_RETRIES:-12}
      - GRAPH_PROJECTION_LEASE_TIMEOUT_SECONDS=${GRAPH_PROJECTION_LEASE_TIMEOUT_SECONDS:-300}
      - USER_ID=${USER_ID:-cerberus}

      # Performance
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}

      # UTF-8 Encoding (Thai language support)
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
    volumes:
      - synapse_sqlite_data:/app/.synapse
    depends_on:
      falkordb:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47780/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - synapse-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  synapse-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: synapse-api
    ports:
      - "${SYNAPSE_API_PORT:-8000}:8000"
    environment:
      - API_KEY=${SYNAPSE_API_KEY:-synapse-dev-key}
      - SYNAPSE_API_KEY=${SYNAPSE_API_KEY:-synapse-dev-key}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:7533,http://127.0.0.1:7533}
      - DEBUG=${DEBUG:-false}
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_URI=redis://falkordb:6379
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      - FALKORDB_DATABASE=${FALKORDB_DATABASE:-user-bfipa}
      - QDRANT_URL=http://qdrant:6333
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMBEDDER_PROVIDER=${EMBEDDER_PROVIDER:-openai}
      - USER_ID=${USER_ID:-cerberus}
      - FEED_BUFFER_SIZE=${FEED_BUFFER_SIZE:-500}
      - GRAPH_CANONICAL_DATABASE=${GRAPH_CANONICAL_DATABASE:-${FALKORDB_DATABASE:-user-bfipa}}
      - GRAPH_DEFAULT_GROUP_ID=${GRAPH_DEFAULT_GROUP_ID:-global}
      - GRAPH_PROJECTION_MAX_INFLIGHT=${GRAPH_PROJECTION_MAX_INFLIGHT:-1}
      - GRAPH_PROJECTION_MIN_INTERVAL_SECONDS=${GRAPH_PROJECTION_MIN_INTERVAL_SECONDS:-10}
      - GRAPH_PROJECTION_COOLDOWN_SECONDS=${GRAPH_PROJECTION_COOLDOWN_SECONDS:-300}
      - GRAPH_PROJECTION_MAX_RETRIES=${GRAPH_PROJECTION_MAX_RETRIES:-12}
      - GRAPH_PROJECTION_LEASE_TIMEOUT_SECONDS=${GRAPH_PROJECTION_LEASE_TIMEOUT_SECONDS:-300}

      # UTF-8 Encoding (Thai language support)
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
    volumes:
      - synapse_sqlite_data:/app/.synapse
    depends_on:
      falkordb:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - synapse-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  synapse-ui:
    build:
      context: ./synapse-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_KEY: ${SYNAPSE_API_KEY:-synapse-dev-key}
    container_name: synapse-ui
    ports:
      - "${SYNAPSE_UI_PORT:-7533}:7533"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_API_KEY=${SYNAPSE_API_KEY:-synapse-dev-key}
      - NODE_ENV=production
    depends_on:
      synapse-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synapse-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

networks:
  synapse-network:
    driver: bridge
    name: synapse-network

volumes:
  falkordb_data:
    name: synapse-falkordb-data
  qdrant_data:
    name: synapse-qdrant-data
  synapse_sqlite_data:
    name: synapse-sqlite-data
