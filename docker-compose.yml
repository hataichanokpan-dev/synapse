# Synapse Docker Compose
# Knowledge Graph + Vector DB + Thai NLP

services:
  # FalkorDB - Graph Database (Redis-based)
  falkordb:
    image: falkordb/falkordb:latest
    container_name: synapse-falkordb
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    environment:
      - FALKORDB_ARGS=--save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: synapse-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Synapse MCP Server
  synapse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapse-server
    ports:
      - "47780:47780"
    environment:
      - FALKORDB_URI=redis://falkordb:6379
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      falkordb:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  falkordb_data:
  qdrant_data:
