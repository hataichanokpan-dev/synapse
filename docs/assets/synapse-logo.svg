<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)" opacity="0.1"/>

  <!-- Synapse nodes -->
  <circle cx="60" cy="70" r="15" fill="url(#grad)"/>
  <circle cx="140" cy="70" r="15" fill="url(#grad)"/>
  <circle cx="100" cy="130" r="15" fill="url(#grad)"/>
  <circle cx="50" cy="140" r="10" fill="url(#grad)" opacity="0.6"/>
  <circle cx="150" cy="140" r="10" fill="url(#grad)" opacity="0.6"/>

  <!-- Connections (synapses) -->
  <line x1="60" y1="70" x2="140" y2="70" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="100" y2="130" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="70" x2="100" y2="130" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="50" y2="140" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="100" y1="130" x2="150" y2="140" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Center glow -->
  <circle cx="100" cy="100" r="8" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
