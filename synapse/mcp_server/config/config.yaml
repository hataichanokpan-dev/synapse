# Synapse MCP Server Configuration
# LLM: Anthropic Claude
# Embedder: Local (multilingual-e5-small, 384-dim)

server:
  transport: "http"
  host: "0.0.0.0"
  port: 47780

llm:
  provider: "anthropic"
  model: "GLM-5"
  max_tokens: 4096

  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}

embedder:
  provider: "local"
  model: "intfloat/multilingual-e5-small"
  dimensions: 384  # Match Oracle v2

  providers:
    local:
      model_name: "intfloat/multilingual-e5-small"
      device: null  # auto-detect

database:
  provider: "falkordb"

  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://localhost:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:synapse}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:cerberus}
  entity_types:
    - name: "Preference"
      description: "User preferences, choices, opinions, or selections"
    - name: "Requirement"
      description: "Specific needs, features, or functionality that must be fulfilled"
    - name: "Procedure"
      description: "Standard operating procedures and sequential instructions"
    - name: "Location"
      description: "Physical or virtual places where activities occur"
    - name: "Event"
      description: "Time-bound activities, occurrences, or experiences"
    - name: "Organization"
      description: "Companies, institutions, groups, or formal entities"
    - name: "Document"
      description: "Information content in various forms"
    - name: "Topic"
      description: "Subject of conversation, interest, or knowledge domain"
    - name: "Object"
      description: "Physical items, tools, devices, or possessions"
